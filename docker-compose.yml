version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bandoso_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: bandoso_tq
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
    container_name: bandoso_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password123
      - DB_NAME=bandoso_tq
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./public/images:/app/public/images
    depends_on:
      - db

  frontend:
    build:
      context: .
    container_name: bandoso_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
